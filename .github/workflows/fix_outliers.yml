name: Scan and Fix Distance Outliers

on:
  workflow_dispatch: # Allows you to manually trigger this run whenever you notice outliers

jobs:
  fix-outliers:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10.20'
        cache: 'pip'

    - name: Install Workflow Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install smartsheet-python-sdk geopy

    - name: Execute Outlier Auto-Correction Script
      run: python fix_outliers.py
      env:
        SMARTSHEET_TOKEN: ${{ secrets.SMARTSHEET_TOKEN }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
